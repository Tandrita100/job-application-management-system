<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h1>Add New Job</h1>
    <form th:action="@{/save-job}" method="post" th:object="${jobApplication}">
        <label>Company</label>
        <input type="text" th:field="*{company}">
        <br><br>
        <label>Position</label>
        <input type="text" th:field="*{position}">
        <br><br>
        <label>Platform</label>
        <input type="text" th:field="*{platform}">
        <br><br>
        <label>Job Type</label>
        <select th:field="*{jobType}">
            <option value="REMOTE">REMOTE</option>
            <option value="HYBRID">HYBRID</option>
            <option value="ONSITE">ONSITE</option>
        </select>
        <br><br>
        <label>Location</label>
        <input type="text" th:field="*{location}">
        <br><br>
        <label>Applied Date</label>
        <input type="date" th:field="*{appliedDate}">
        <br><br>
        <label>Job Status</label>
        <select th:field="*{jobStatus}" >
            <option value="APPLIED">APPLIED</option>
            <option value="WAITING">WAITING</option>
            <option value="INTERVIEW">INTERVIEW</option>
            <option value="HR_INTERVIEW">HR_INTERVIEW</option>
            <option value="TECHNICAL_ROUND_1">TECHNICAL_ROUND_1</option>
            <option value="TECHNICAL_ROUND_2">TECHNICAL_ROUND_2</option>
            <option value="MANAGER_ROUND">MANAGER_ROUND</option>
            <option value="OFFER">OFFER</option>
            <option value="REJECTED">REJECTED</option>
            <option value="WITHDRAW">WITHDRAW</option>
            <option value="NO_RESPONSE">NO_RESPONSE</option>
            <option value="GHOSTED">GHOSTED</option>
        </select>
        <br><br>
        <label>Notes</label>
        <textarea rows="4" cols="40" th:field="*{notes}"></textarea>
        <br><br>
        <button type="submit">Save Job</button>
    </form>
</div>
</body>
</html>
