<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon">
    <title>Job Application Tracker | Add Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="text-center mb-4">Add New Job</h1>
    <p class="text-center text-muted mb-4">
        Fill in the details below to add a new job application.
    </p>
    <div class="card shadow-lg border-0">
        <div class="card-body p-4">
            <form th:action="@{/save-job}" method="post" th:object="${jobApplication}">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label class="form-label">Company<span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{company}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('company')}"
                         th:errors="*{company}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Position<span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{position}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('position')}"
                         th:errors="*{position}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Platform<span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{platform}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('platform')}"
                         th:errors="*{platform}"></div>

                </div>
                <div class="mb-3">
                    <label class="form-label">Job Type</label>
                    <select class="form-select" th:field="*{jobType}">
                        <option value="REMOTE">REMOTE</option>
                        <option value="HYBRID">HYBRID</option>
                        <option value="ONSITE">ONSITE</option>
                    </select>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('jobType')}"
                         th:errors="*{jobType}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Location<span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{location}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('location')}"
                         th:errors="*{location}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Applied Date<span class="text-danger">*</span></label>
                    <input type="date" class="form-control" th:field="*{appliedDate}" onclick="this.showPicker()">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('appliedDate')}"
                         th:errors="*{appliedDate}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Job Status</label>
                    <select class="form-select" th:field="*{jobStatus}">
                        <option value="APPLIED">APPLIED</option>
                        <option value="WAITING">WAITING</option>
                        <option value="INTERVIEW">INTERVIEW</option>
                        <option value="HR_INTERVIEW">HR_INTERVIEW</option>
                        <option value="TECHNICAL_ROUND_1">TECHNICAL_ROUND_1</option>
                        <option value="TECHNICAL_ROUND_2">TECHNICAL_ROUND_2</option>
                        <option value="MANAGER_ROUND">MANAGER_ROUND</option>
                        <option value="OFFER">OFFER</option>
                        <option value="REJECTED">REJECTED</option>
                        <option value="WITHDRAW">WITHDRAW</option>
                        <option value="NO_RESPONSE">NO_RESPONSE</option>
                        <option value="GHOSTED">GHOSTED</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    <textarea class="form-control" rows="3" maxlength="50"
                              placeholder="e.g. Waiting for HR, Referral, Follow up" th:field="*{notes}"></textarea>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/}" class="btn btn-secondary px-4">Cancel</a>
                    <button type="submit" class="btn btn-success px-4">Save Job</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
