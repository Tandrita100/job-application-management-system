<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon">
    <title>Job Application Tracker | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container py-5">
    <div class="card shadow border-0">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <h1 class="fw-bold mb-2">Job Application Tracker</h1>
                <p class="text-muted mb-0">Organize and manage your job applications in one place.</p>
            </div>
            <div class="d-flex justify-content-end mb-3">
                <a th:href="@{/add-job}" class="btn btn-success mb-3">+ Add Job</a>
            </div>
            <div th:if="${not #lists.isEmpty(jobs)}">
                <div class="table-responsive">
                    <table class="table table-hover table-striped align middle">
                        <thead class="table-dark">
                        <tr>
                            <th>Company</th>
                            <th>Position</th>
                            <th>Platform</th>
                            <th>Job Type</th>
                            <th>Location</th>
                            <th>Applied Date</th>
                            <th>Job Status</th>
                            <th>Notes</th>
                            <th class="text-center" style="width:170px">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="job : ${jobs}">
                            <td th:text="${job.company}"></td>
                            <td th:text="${job.position}"></td>
                            <td th:text="${job.platform}"></td>
                            <td th:text="${job.jobType}"></td>
                            <td th:text="${job.location}"></td>
                            <td th:text="${job.appliedDate}"></td>
                            <td th:text="${job.jobStatus}"></td>
                            <td th:text="${job.notes}"></td>
                            <td class="text-center align-middle">
                                <a th:href="@{/edit-job/{id}(id=${job.id})}"
                                   class="btn btn-warning btn-sm action-btn me-2">Edit</a>
                                <a th:href="@{/delete-job/{id}(id=${job.id})}" class="btn btn-danger btn-sm action-btn"
                                   onclick="return confirm('Are you sure you want to delete this job application?')">Delete</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="text-center mt-5" th:if="${#lists.isEmpty(jobs)}">
                <h4>No job applications yet.</h4>
                <p class="text-muted">
                    Click the <strong>Add Job</strong> button to create your first job application.
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
