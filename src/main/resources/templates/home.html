<!DOCTYPE html>
<html>
<head>
    <title>Welcome to the HTML webpage</title>
</head>
<body>
<table border="1">
    <tr>
        <th>Company</th>
        <th>Position</th>
        <th>Location</th>
    </tr>
    <tr th:each="job : ${jobs}">
        <td th:text="${job.company}"></td>
        <td th:text="${job.position}"></td>
        <td th:text="${job.location}"></td>
    </tr>
</table>
</body>
</html>
