<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Job Application Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center mb-4">Job Application Tracker</h1>
    <a th:href="@{/add-job}" class="btn btn-success mb-3">Add Job</a>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>Company</th>
            <th>Position</th>
            <th>Platform</th>
            <th>Job Type</th>
            <th>Location</th>
            <th>Applied Date</th>
            <th>Job Status</th>
            <th>Notes</th>
            <th class="text-center" style="width:170px">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="job : ${jobs}">
            <td th:text="${job.company}"></td>
            <td th:text="${job.position}"></td>
            <td th:text="${job.platform}"></td>
            <td th:text="${job.jobType}"></td>
            <td th:text="${job.location}"></td>
            <td th:text="${job.appliedDate}"></td>
            <td th:text="${job.jobStatus}"></td>
            <td th:text="${job.notes}"></td>
            <td class="text-center align-middle">
                <a th:href="@{/edit-job/{id}(id=${job.id})}" class="btn btn-warning btn-sm action-btn me-2">Edit</a>
                <a th:href="@{/delete-job/{id}(id=${job.id})}" class="btn btn-danger btn-sm action-btn">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
